name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REMOVEBG_API_KEY: ${{ secrets.REMOVEBG_API_KEY }}
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          test -d dist/assets || (echo "ERROR: dist/assets missing" && exit 1)
          echo "Build verified: dist/index.html and dist/assets exist"
          ls -la dist/
          echo "---"
          ls dist/assets/ | head -20

      - name: Find correct remote path
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }}:25141 -e "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            echo '--- Home directory ---';
            ls;
            echo '--- Check /home/designfo/ ---';
            ls /home/designfo/ || echo 'not found';
            echo '--- Check domains ---';
            ls /home/designfo/domains/ || echo 'not found';
            echo '--- Check domain public_html ---';
            ls /home/designfo/domains/designforge360.in/public_html/ || echo 'not found';
            echo '--- Check direct public_html ---';
            ls /home/designfo/public_html/ || echo 'not found';
            quit"

      - name: Deploy via SFTP
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }}:25141 -e "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            set mirror:include-hidden yes;
            mirror -R --delete --no-perms --verbose --exclude-glob .git --exclude-glob cgi-bin ./dist/ /home/designfo/domains/designforge360.in/public_html/;
            echo '--- Deployed files ---';
            ls /home/designfo/domains/designforge360.in/public_html/;
            echo '--- Check .htaccess ---';
            ls -la /home/designfo/domains/designforge360.in/public_html/.htaccess || echo '.htaccess MISSING';
            echo '--- Check assets ---';
            ls /home/designfo/domains/designforge360.in/public_html/assets/ | head -10;
            quit"
