name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REMOVEBG_API_KEY: ${{ secrets.REMOVEBG_API_KEY }}
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          test -d dist/assets || (echo "ERROR: dist/assets missing" && exit 1)
          echo "Build verified: dist/index.html and dist/assets exist"
          ls -la dist/
          echo "---"
          ls dist/assets/ | head -20

      - name: Find correct deploy path
        id: path
        run: |
          sudo apt-get install -y lftp
          # Try both common DirectAdmin paths and find which one has content or exists
          OUTPUT=$(lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }}:25141 -e "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            echo PROBE_START;
            echo HOME_DIR;
            pwd;
            ls;
            echo TRY_DOMAINS;
            ls /home/designfo/domains/designforge360.in/public_html/ 2>&1 || echo DOMAINS_NOTFOUND;
            echo TRY_DIRECT;
            ls /home/designfo/public_html/ 2>&1 || echo DIRECT_NOTFOUND;
            echo PROBE_END;
            quit" 2>&1)
          echo "$OUTPUT"
          # Detect correct path
          if echo "$OUTPUT" | grep -q "DOMAINS_NOTFOUND"; then
            echo "DEPLOY_PATH=/home/designfo/public_html/" >> $GITHUB_OUTPUT
            echo "Using /home/designfo/public_html/"
          else
            echo "DEPLOY_PATH=/home/designfo/domains/designforge360.in/public_html/" >> $GITHUB_OUTPUT
            echo "Using /home/designfo/domains/designforge360.in/public_html/"
          fi

      - name: Deploy via SFTP (fixed)
        run: |
          DEPLOY_PATH="${{ steps.path.outputs.DEPLOY_PATH }}"
          echo "Deploying to: $DEPLOY_PATH"

          sudo apt-get install -y lftp

          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }}:25141 <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 10
          set net:timeout 60

          cd $DEPLOY_PATH

          # REMOVE OLD FILES
          rm -rf assets
          rm -rf tools
          rm -rf guides
          rm -rf comparisons
          rm -f index.html

          # UPLOAD NEW BUILD
          mirror -R ./dist .

          # VERIFY
          echo "---- CHECK ----"
          ls
          ls assets

          quit
          EOF
