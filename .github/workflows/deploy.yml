name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REMOVEBG_API_KEY: ${{ secrets.REMOVEBG_API_KEY }}
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "ERROR: dist/index.html missing"; exit 1; }
          test -d dist/assets || { echo "ERROR: dist/assets missing"; exit 1; }
          echo "Build verified: dist/index.html and dist/assets exist"
          ls -la dist/
          echo "---"
          ls dist/assets/ | head -20

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          DEPLOY_PATH="/home/designfo/public_html/"
          echo "Deploying to: $DEPLOY_PATH"

          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
               sftp://${{ secrets.FTP_HOST }}:25141 <<'LFTP_SCRIPT'
          set sftp:auto-confirm yes
          set net:max-retries 5
          set net:timeout 60
          set mirror:include-hidden yes

          cd /home/designfo/public_html/

          # Remove old build artifacts (selective — preserve cgi-bin, images, etc.)
          rm -rf assets
          rm -rf tools
          rm -rf guides
          rm -rf comparisons
          rm -rf finance
          rm -rf about
          rm -rf blog
          rm -rf community
          rm -rf support
          rm -rf test-my-app
          rm -rf find-app-testers
          rm -rf free-app-testing
          rm -rf get-beta-testers
          rm -f index.html
          rm -f sitemap.xml
          rm -f robots.txt
          rm -f og-default.png
          rm -f og-default.svg
          rm -f favicon.svg

          # Upload new build
          mirror -R --verbose --no-perms ./dist /home/designfo/public_html/

          # Verify critical files exist on server
          echo "---- VERIFY ----"
          ls /home/designfo/public_html/index.html
          ls /home/designfo/public_html/.htaccess
          ls /home/designfo/public_html/assets/

          quit
          LFTP_SCRIPT

          echo "Deploy complete"
